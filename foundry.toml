[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.34"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

# Optimizer settings to reduce contract size
optimizer = true
optimizer_runs = 1  # Low runs optimizes for deployment size over runtime gas

# Via IR for better optimization (reduces contract size significantly)
via_ir = true

# EVM version - cancun required for Curve Tricrypto pools
evm_version = "cancun"

[profile.ci]
fuzz = { runs = 5 }
invariant = { runs = 5 }

[profile.coverage]
via_ir = false
optimizer = false

[profile.h4]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.34"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]
optimizer = true
optimizer_runs = 1
via_ir = true
evm_version = "cancun"
test = "test/h4verify"

[profile.verify]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.34"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]
optimizer = true
optimizer_runs = 1
via_ir = true
evm_version = "cancun"
test = "test/verify"

[profile.h2]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.34"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]
optimizer = true
optimizer_runs = 1
via_ir = true
evm_version = "cancun"
test = "test/h2verify"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
